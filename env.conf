# Docker Compose Environment Configuration
DOCKER_DEFAULT_PLATFORM=linux/amd64

# Shared Database Configuration (ioc-knowledge-db hosts all databases)
IOC_KNOWLEDGE_DB=ioc-knowledge-db
IOC_KNOWLEDGE_DB_USER=postgresUser
IOC_KNOWLEDGE_DB_PASSWORD=postgresPW
IOC_KNOWLEDGE_DB_PORT=5456
EMBEDDING_VECTOR_SIZE=384

# Mgmt service DB (local dev — points to ioc-knowledge-db exposed port)
POSTGRES_DB=cfn_mgmt
POSTGRES_USER=postgresUser
POSTGRES_PASSWORD=postgresPW
POSTGRES_HOST=localhost
POSTGRES_PORT=5456

# Database Debug (set to True to see SQL queries)
DB_ECHO=False

# Application Configuration
APP_NAME="IoC CFN Management Backend Service"
IMAGE_NAME="ghcr.io/cisco-eti/ioc-cfn-mgmt-plane-svc:latest"
PORT=9000
DEBUG=True
LOG_LEVEL=INFO
ADMIN_USER_PASSWORD=admin
CFN_DEV_MODE=False

# Memory Provider Encryption Key
# Auto-generated in .secrets/encryption.key on first run (works for local dev and docker-compose).
# For production: set MEMORY_PROVIDER_ENCRYPTION_KEY env var to override.
# Generate key: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
# MEMORY_PROVIDER_ENCRYPTION_KEY=your-key-here

# IoC CFN Service Configuration
CFN_NAME="My Cognition Fabric Node"
HEARTBEAT_INTERVAL_SECONDS=5
MCP_ENABLED=false
MCP_PORT=9002
DB_NAME=cfn_cp
DB_SSL_MODE=disable

# IoC Mgmt UI Service Configuration
NEXTAUTH_URL=http://localhost:9001
NEXTAUTH_SECRET=your_nextauth_secret_here
NEXT_PUBLIC_CFN_UI_API_BASE_URL=http://localhost:9000

# IoC Cognition Engine Configuration
AZURE_OPENAI_ENDPOINT="<your_endpoint_name>"
AZURE_OPENAI_API_KEY="<your_azure_api_key>"
AZURE_OPENAI_DEPLOYMENT="<azure/your_model_name>"
