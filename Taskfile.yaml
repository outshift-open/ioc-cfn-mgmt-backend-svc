version: "3"

dotenv:
  - env.conf

vars:
  TASK_VERSION: v3.39.2
  TASK_INSTALL_DIR: ./bin
  SRC_DIR: "{{.PWD}}/src"
  PYTHON: python3
  BIN_DIR: "{{.PWD}}/bin"

tasks:
  deps:
    desc: Install all dependencies (Python and Atlas)
    cmds:
      - task: install-atlas
      - task: install-update-poetry
      - task: poetry-check
    silent: false

  install-atlas:
    desc: Install Atlas migration tool to bin directory
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - curl -sSf https://atlasgo.sh | sh -s -- --no-install -o {{.BIN_DIR}}/atlasgo -y
      - chmod +x {{.BIN_DIR}}/atlasgo
    status:
      - '[ -f "{{.BIN_DIR}}/atlasgo" ]'

  install-update-poetry:
    desc: Install and update Python dependencies using Poetry
    cmds:
      - poetry update

  poetry-check:
    desc: Validate poetry configuration
    cmds:
      - poetry check

  generate-openapi-spec:
    desc: Generate OpenAPI specification and save to docs/openapi/openapi.json
    cmds:
      - poetry run python scripts/generate_openapi_spec.py
    dir: "{{.PWD}}"

  dev:
    desc: Start development server with hot reload
    cmds:
      - task: deps
      - task: db-migrate-apply
      - task: generate-openapi-spec
      - poetry run uvicorn server.main:app --host 0.0.0.0 --port 8000 --reload
    dir: "{{.SRC_DIR}}"

  run:
    desc: Start production server (installs deps, applies db migrations, then runs)
    cmds:
      - task: deps
      - task: db-migrate-apply
      - task: generate-openapi-spec
      - poetry run python -m server.main
    dir: "{{.SRC_DIR}}"

  test:
    desc: Run all tests with pytest
    cmds:
      - poetry run pytest tests/ -v

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - poetry run pytest tests/ --cov=server --cov-report=term-missing

  lint-check:
    desc: Run linting checks
    cmds:
      - ./scripts/lint.sh --check

  lint:
    desc: Fix linting issues automatically
    cmds:
      - ./scripts/lint.sh

  clean:
    desc: Clean Python cache files
    cmds:
      - find . -type d -name "__pycache__" -delete
      - find . -name "*.pyc" -delete

  ## Docker and Docker-Compose Tasks ##
  docker-build:
    desc: Build Docker image with docker-compose
    cmds:
      - docker compose --env-file env.conf build --no-cache ioc-cfn-mgmt-backend-svc

  docker-run:
    desc: Run Docker container with docker-compose
    cmds:
      - docker compose --env-file env.conf up --build --pull always ioc-cfn-mgmt-backend-svc

  docker-compose-full-stack-up:
    desc: Start all services with docker-compose
    cmds:
      - docker compose --env-file env.conf --profile full-stack up --pull always

  docker-compose-full-stack-down:
    desc: Stop all services with docker-compose
    cmds:
      - docker compose --env-file env.conf --profile full-stack down

  docker-compose-full-stack-down-with-volumes:
    desc: Stop all services and remove volumes with docker-compose
    cmds:
      - docker compose --env-file env.conf --profile full-stack down -v

  docker-compose-db-up:
    desc: Start only databases (PostgreSQL) with db-only profile
    cmds:
      - docker compose --env-file env.conf --profile db-only up -d --pull always

  docker-compose-db-down:
    desc: Stop only databases with db-only profile
    cmds:
      - docker compose --env-file env.conf --profile db-only down

  docker-compose-db-down-with-volumes:
    desc: Stop databases and remove volumes with db-only profile
    cmds:
      - docker compose --env-file env.conf --profile db-only down -v

  # Database migration tasks
  db-migrate-apply:
    desc: Apply pending database migrations
    cmds:
      - '{{.BIN_DIR}}/atlasgo migrate apply --dir "file://migrations" --env local'
    dir: "src/server/database/relational_db"

  db-migrate-status:
    desc: Show database migration status
    cmds:
      - /usr/local/bin/atlasgo migrate status --dir "file://migrations" --env local
    dir: "src/server/database/relational_db"

  db-migrate-new:
    desc: Create a new migration which will be placed in migrations folder (provide name as argument)
    # task db-migrate-new -- "msg_for_migration"
    cmds:
      - /usr/local/bin/atlasgo migrate diff {{.CLI_ARGS}} --dir "file://migrations" --env local
    dir: "src/server/database/relational_db"

  db-migrate-hash:
    desc: Rehash migration files to update checksums
    cmds:
      - /usr/local/bin/atlasgo migrate hash --dir "file://migrations"
    dir: "src/server/database/relational_db"

  db-seed:
    desc: Seed the database with initial data
    cmds:
      - poetry run psql postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@localhost:$POSTGRES_PORT/cfn_mgmt -f scripts/populate_software.sql
    dir: "{{.SRC_DIR}}/server/database/relational_db"

  help:
    desc: Show available tasks
    cmds:
      - task --list
