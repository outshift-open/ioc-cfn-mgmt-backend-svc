version: "3"

dotenv:
  - .env

vars:
  TASK_VERSION: v3.39.2
  TASK_INSTALL_DIR: ./bin
  SRC_DIR: "{{.PWD}}/src"
  PYTHON: python3
  BIN_DIR: "{{.PWD}}/bin"
  GIT_COMMIT_SHA:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  GIT_COMMIT_TIME:
    sh: git log -1 --format=%cI 2>/dev/null || echo "unknown"
  GIT_BRANCH:
    sh: git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown"

tasks:
  deps:
    desc: Install all dependencies (Python)
    cmds:
      - task: install-update-poetry
      - task: poetry-check
    silent: false

  install-update-poetry:
    desc: Install and update Python dependencies using Poetry
    cmds:
      - poetry update

  poetry-check:
    desc: Validate poetry configuration
    cmds:
      - poetry check

  generate-openapi-spec:
    desc: Generate OpenAPI specification and save to docs/openapi/openapi.json
    cmds:
      - poetry run python scripts/generate_openapi_spec.py
    dir: "{{.PWD}}"

  dev:
    desc: Start development server with hot reload
    cmds:
      - task: deps
      - task: db-migrate-apply
      - task: generate-openapi-spec
      - poetry run uvicorn server.main:app --host 0.0.0.0 --port 9000 --reload
    dir: "{{.SRC_DIR}}"

  run:
    desc: Start production server (installs deps, applies db migrations, then runs)
    cmds:
      - task: deps
      - task: db-migrate-apply
      - task: generate-openapi-spec
      - poetry run python -m server.main
    dir: "{{.SRC_DIR}}"

  test:
    desc: Run all tests with pytest
    cmds:
      - poetry run pytest tests/ -v

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - poetry run pytest tests/ --cov=server --cov-report=term-missing

  lint-check:
    desc: Run linting checks
    cmds:
      - ./scripts/lint.sh --check

  lint:
    desc: Fix linting issues automatically
    cmds:
      - ./scripts/lint.sh

  clean:
    desc: Clean Python cache files
    cmds:
      - find . -type d -name "__pycache__" -delete
      - find . -name "*.pyc" -delete

  ## Docker and Docker-Compose Tasks ##
  docker-build:
    desc: Build Docker image with docker-compose
    cmds:
      - docker build -t ${IMAGE_NAME} -f Dockerfile .

  docker-run:
    desc: Run Docker container with docker-compose
    cmds:
      - docker compose --env-file .env up ioc-cfn-mgmt-plane-svc

  docker-compose-full-stack-pull:
    desc: Pull latest images for all services with docker-compose
    cmds:
      - docker compose --env-file .env --profile full-stack pull

  docker-compose-full-stack-up:
    desc: Start all services with docker-compose
    cmds:
      - docker compose --env-file .env --profile full-stack up -d
      - docker compose --env-file .env --profile full-stack logs -f

  docker-compose-full-stack-up-build:
    desc: Start all services with docker-compose, rebuilding images
    cmds:
      - docker compose --env-file .env --profile full-stack up --build -d
      - docker compose --env-file .env --profile full-stack logs -f

  docker-compose-full-stack-down:
    desc: Stop all services with docker-compose
    cmds:
      - docker compose --env-file .env --profile full-stack down

  docker-compose-full-stack-down-with-volumes:
    desc: Stop all services and remove volumes with docker-compose
    cmds:
      - docker compose --env-file .env --profile full-stack down -v

  # Database migration tasks (Alembic)
  db-migrate-apply:
    desc: Apply pending database migrations (alembic upgrade head)
    env:
      PYTHONPATH: "{{.SRC_DIR}}"
    cmds:
      - poetry run alembic upgrade head

  db-migrate-status:
    desc: Show current migration revision and history
    env:
      PYTHONPATH: "{{.SRC_DIR}}"
    cmds:
      - poetry run alembic current
      - poetry run alembic history --verbose

  db-migrate-revision:
    desc: Generate a new Alembic migration (autogenerate from models)
    env:
      PYTHONPATH: "{{.SRC_DIR}}"
    cmds:
      - poetry run alembic revision --autogenerate -m "{{.CLI_ARGS}}"

  db-migrate-downgrade:
    desc: Downgrade database by one revision
    env:
      PYTHONPATH: "{{.SRC_DIR}}"
    cmds:
      - poetry run alembic downgrade -1

  db-seed:
    desc: Seed the database with initial data
    cmds:
      - poetry run psql
        postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@localhost:$POSTGRES_PORT/cfn_mgmt
        -f scripts/populate_software.sql
    dir: "{{.SRC_DIR}}/server/database/relational_db"

  help:
    desc: Show available tasks
    cmds:
      - task --list
