services:
  tkf-relational-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tkf}
      POSTGRES_USER: ${POSTGRES_USER:-postgresUser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgresPW}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
