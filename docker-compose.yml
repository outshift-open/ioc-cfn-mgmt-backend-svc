services:
  ### Database Services ###
  ioc-mgmt-relational-db:
    image: postgres:17-alpine
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - db-only
      - full-stack
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ioc}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-ioc} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AgensGraph - Backing Graph Database for IoC Knowledge Memory Service
  # Graph per Workspace and MAS. Name of the graph is <graph_workspace_id_mas_id>
  # Port Mapping: 5456:5432
  #   - Host Port: 5456 (to avoid conflicts with local PostgreSQL on 5432)
  #   - Container Port: 5432 (PostgreSQL default, cannot be changed without config)
  ioc-graph-db:
    image: skaiworldwide/agensgraph:v2.16.0-alpine3.22
    platform: linux/amd64
    profiles:
      - db-only
      - full-stack
    environment:
      POSTGRES_DB: ${AGENSGRAPH_DB:-ioc-graph-db}
      POSTGRES_USER: ${AGENSGRAPH_USER}
      POSTGRES_PASSWORD: ${AGENSGRAPH_PASSWORD}
    ports:
      - "${AGENSGRAPH_PORT:-5456}:5432"
    volumes:
      - agensgraph_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 5432 -U ${AGENSGRAPH_USER} -d ${AGENSGRAPH_DB:-ioc-graph-db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # AgensGraph Viewer - Web UI for AgensGraph Database
  # Port Mapping: 5457:3000
  #   - Host Port: 5457 (accessible from your machine)
  #   - Container Port: 3000 (AGViewer's default internal port)
  ioc-graph-db-viewer:
    image: skaiworldwide/agviewer:latest
    profiles:
      - db-only
      - full-stack
    environment:
      DB_HOST: ioc-graph-db
      DB_PORT: 5432
      DB_USER: ${AGENSGRAPH_USER}
      DB_PASSWORD: ${AGENSGRAPH_PASSWORD}
      DB_NAME: ${AGENSGRAPH_DB:-ioc-graph-db}
    ports:
      - "${AGENSGRAPH_PORT_UI:-5457}:3000"
    restart: unless-stopped
    depends_on:
      - ioc-graph-db

  ### End Database Services ###

  ### Application Services ###
  # Port Mapping Format: "HOST_PORT:CONTAINER_PORT"
  # - HOST_PORT: The port on your local machine (what you connect to)
  # - CONTAINER_PORT: The port the service listens on inside the container

  # Mgmt. Plane Backend Service - FastAPI backend for workspaces, users, CFN nodes
  # Port Mapping: 9000:9000 (same port inside and outside container)
  ioc-cfn-mgmt-plane-svc:
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-plane-svc:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "9000:9000"
    environment:
      - SERVICE_NAME=ioc-cfn-mgmt-plane-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ADMIN_USER_PASSWORD=${ADMIN_USER_PASSWORD}
      - POSTGRES_HOST=ioc-mgmt-relational-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ioc}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PORT=9000
      - CFN_DEV_MODE=${CFN_DEV_MODE}
    restart: unless-stopped
    depends_on:
      ioc-mgmt-relational-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ioc-cfn-mgmt-plane-svc:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Mgmt. Plane UI - Next.js frontend for management plane
  # Port Mapping: 9001:9001 (same port inside and outside container)
  ioc-cfn-mgmt-plane-ui:
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-plane-ui:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "9001:9001"
    environment:
      - NODE_ENV=production
      - PORT=9001
      - CFN_UI_API_BASE_URL=http://ioc-cfn-mgmt-plane-svc:9000
      - NEXT_PUBLIC_CFN_UI_API_BASE_URL=http://localhost:9000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:9001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    restart: unless-stopped
    depends_on:
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy

  # CFN Service - Cognitive Fabric Node service
  # Port Mapping: 9002:9002 (same port inside and outside container)
  ioc-cfn-svc:
    image: ghcr.io/cisco-eti/ioc-cfn-svc:latest
    container_name: ioc-cfn-svc
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      PORT: "9002"
      APP_NAME: "ioc-cfn-svc"
      MGMT_URL: http://ioc-cfn-mgmt-plane-svc:9000
      CFN_NAME: ${CFN_NAME:-cfn-new}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-10}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      MCP_PORT: ${MCP_PORT:-9002}
      DB_HOST: ioc-mgmt-relational-db
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_NAME: ${DB_NAME:-cfn_cp}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
    depends_on:
      ioc-mgmt-relational-db:
        condition: service_healthy
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy

  # IoC Knowledge Memory Service - Memory and knowledge graph management
  # Port Mapping: 9003:9003 (same port inside and outside container)
  ioc-knowledge-memory-svc:
    image: ghcr.io/cisco-eti/ioc-knowledge-memory-svc:2026-02-25-ee3a49b
    platform: linux/amd64
    profiles:
      - full-stack
    ports:
      - "9003:9003"
    environment:
      - SERVICE_NAME=ioc-knowledge-memory-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=9003
      - AGENSGRAPH_HOST=ioc-graph-db
      - AGENSGRAPH_DB=${AGENSGRAPH_DB:-ioc-graph-db}
      - AGENSGRAPH_USER=${AGENSGRAPH_USER}
      - AGENSGRAPH_PASSWORD=${AGENSGRAPH_PASSWORD}
      - AGENSGRAPH_PORT=5432
      - MEMORY_PROVIDER_REGISTRATION_URL=http://ioc-cfn-mgmt-plane-svc:9000
    restart: unless-stopped
    depends_on:
      ioc-graph-db:
        condition: service_healthy
      ioc-graph-db-viewer:
        condition: service_started
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Default (Built-in) Cognitive Agents (Functions) - Knowledge Management
  # Port Mapping: 9004:9004 (same port inside and outside container)
  # TODO: Add service configuration when image is available
  # ioc-cfn-ca-knowledge-mgmt:
  #   image: ghcr.io/cisco-eti/ioc-cfn-ca-knowledge-mgmt:latest
  #   platform: ${DOCKER_DEFAULT_PLATFORM}
  #   profiles:
