services:
  # Backing Database for IoC Knowledge Memory Service
  # Graph(Agensgraph) + PgVector + Postgres Database
  # Port Mapping: 5456:5432
  #   - Host Port: 5456 (to avoid conflicts with local PostgreSQL on 5432)
  #   - Container Port: 5432 (PostgreSQL default, cannot be changed without config)
  #   - it will have cfn_mgmt_db and ioc_knowledge_db both
  ioc-knowledge-db:
    image: ghcr.io/cisco-eti/ioc-knowledge-memory-svc-db:2.1
    platform: linux/amd64
    profiles:
      - db-only
      - full-stack
    environment:
      POSTGRES_DB: ${IOC_KNOWLEDGE_DB:-ioc-knowledge-db}
      POSTGRES_USER: ${IOC_KNOWLEDGE_DB_USER}
      POSTGRES_PASSWORD: ${IOC_KNOWLEDGE_DB_PASSWORD}
    ports:
      - "${IOC_KNOWLEDGE_DB_PORT:-5456}:5432"
    volumes:
      - ioc_knowledge_db_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 5432 -U ${IOC_KNOWLEDGE_DB_USER} -d ${IOC_KNOWLEDGE_DB:-ioc-knowledge-db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Graph Database Viewer - AgensGraph UI
  # Port Mapping: 5457:3000
  ioc-graph-db-viewer:
    image: skaiworldwide/agviewer:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - db-only
      - full-stack
    ports:
      - "5457:3000"
    environment:
      - DB_HOST=ioc-knowledge-db
      - DB_PORT=5432
      - DB_USER=${IOC_KNOWLEDGE_DB_USER}
      - DB_PASSWORD=${IOC_KNOWLEDGE_DB_PASSWORD}
      - DB_NAME=${IOC_KNOWLEDGE_DB:-ioc-knowledge-db}
    restart: unless-stopped
    depends_on:
      - ioc-knowledge-db
  ### End Database Services ###

  ### Application Services ###
  # Port Mapping Format: "HOST_PORT:CONTAINER_PORT"
  # - HOST_PORT: The port on your local machine (what you connect to)
  # - CONTAINER_PORT: The port the service listens on inside the container

  # Mgmt. Plane Backend Service - FastAPI backend for workspaces, users, CFN nodes
  # Port Mapping: 9000:9000 (same port inside and outside container)
  ioc-cfn-mgmt-plane-svc:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-plane-svc:${IMAGE_TAG:-latest}
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "9000:9000"
    environment:
      - SERVICE_NAME=ioc-cfn-mgmt-plane-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ADMIN_USER_PASSWORD=${ADMIN_USER_PASSWORD}
      - POSTGRES_HOST=ioc-knowledge-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=cfn_mgmt
      - POSTGRES_USER=${IOC_KNOWLEDGE_DB_USER}
      - POSTGRES_PASSWORD=${IOC_KNOWLEDGE_DB_PASSWORD}
      - PORT=9000
      - CFN_DEV_MODE=${CFN_DEV_MODE}
    volumes:
      - ./.secrets:/home/app/.secrets:ro
    restart: unless-stopped
    depends_on:
      ioc-knowledge-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ioc-cfn-mgmt-plane-svc:9000/api/internal/diagnostics/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Mgmt. Plane UI - Next.js frontend for management plane
  # Port Mapping: 9001:9001 (same port inside and outside container)
  ioc-cfn-mgmt-plane-ui:
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-plane-ui:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "9001:9001"
    environment:
      - NODE_ENV=production
      - PORT=9001
      - CFN_UI_API_BASE_URL=http://ioc-cfn-mgmt-plane-svc:9000
      - NEXT_PUBLIC_CFN_UI_API_BASE_URL=http://localhost:9000
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:9001}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    restart: unless-stopped
    depends_on:
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy

  # Knowledge Memory Service - Graph + Vector Memory Storage
  # Port Mapping: 9003:9003 (same port inside and outside container)
  ioc-knowledge-memory-svc:
    image: ghcr.io/cisco-eti/ioc-knowledge-memory-svc:2026-04-08-63560c7
    platform: linux/amd64
    profiles:
      - full-stack
    ports:
      - "9003:9003"
    environment:
      - SERVICE_NAME=ioc-knowledge-memory-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MEMORY_PROVIDER_REGISTRATION_URL=http://ioc-cfn-mgmt-plane-svc:9000
      - MEMORY_PROVIDER_ID=${MEMORY_PROVIDER_ID:-de54dacb-60ab-476a-9e83-64e09f867358}
      - IOC_KNOWLEDGE_DB_HOST=ioc-knowledge-db
      - IOC_KNOWLEDGE_DB=${IOC_KNOWLEDGE_DB:-ioc-knowledge-db}
      - IOC_KNOWLEDGE_DB_USER=${IOC_KNOWLEDGE_DB_USER}
      - IOC_KNOWLEDGE_DB_PASSWORD=${IOC_KNOWLEDGE_DB_PASSWORD}
      - IOC_KNOWLEDGE_DB_PORT=5432
      - EMBEDDING_VECTOR_SIZE=${EMBEDDING_VECTOR_SIZE:-384}
    restart: unless-stopped
    depends_on:
      ioc-knowledge-db:
        condition: service_healthy
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # CFN Service - Cognition Fabric Node service
  # Port Mapping: 9002:9002 (same port inside and outside container)
  ioc-cfn-svc:
    image: ghcr.io/cisco-eti/ioc-cfn-svc:latest
    container_name: ioc-cfn-svc
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    restart: unless-stopped
    ports:
      - "9002:9002"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MGMT_URL=http://ioc-cfn-mgmt-plane-svc:9000
      - CFN_NAME=${CFN_NAME:-cfn-new}
      - HEARTBEAT_INTERVAL_SECONDS=${HEARTBEAT_INTERVAL_SECONDS:-10}
      - SERVICE_NAME=${SERVICE_NAME:-ioc-cfn-svc}
      - DB_NAME=${IOC_KNOWLEDGE_DB}
      - DB_USER=${IOC_KNOWLEDGE_DB_USER}
      - DB_PASSWORD=${IOC_KNOWLEDGE_DB_PASSWORD}
      - DB_HOST=ioc-knowledge-db
      - DB_PORT=5432
      - KNOWLEDGE_MEMORY_SVC_URL=http://ioc-knowledge-memory-svc:9003
      - LLM_PROVIDER=${LLM_PROVIDER:-azure-openai}
      - COGNITION_ENGINE_SVC_URL=http://ioc-cfn-cognition-engine:9004
    depends_on:
      ioc-knowledge-db:
        condition: service_healthy
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy
      ioc-knowledge-memory-svc:
        condition: service_healthy

  ioc-cfn-cognition-engine:
    image: ghcr.io/cisco-eti/ioc-cfn-cognition-engine:2026-04-13-6172854
    ports:
      - "9004:9004"
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    restart: unless-stopped
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - ENABLE_DEDUP=true
      # Auto-register with management plane on startup
      - MGMT_PLANE_URL=http://ioc-cfn-mgmt-plane-svc:9000
      - COGNITION_ENGINE_HOST=ioc-cfn-cognition-engine
      - COGNITION_ENGINE_PORT=9004
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      ioc-cfn-mgmt-plane-svc:
        condition: service_healthy

volumes:
  ioc_knowledge_db_data:
