services:
  ### Database Services ###
  ioc-mgmt-relational-db:
    image: postgres:17-alpine
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - db-only
      - full-stack
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ioc}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-ioc} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  ### End Database Services ###

  ### Application Services ###
  ioc-cfn-mgmt-backend-svc:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-backend-svc:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=ioc-cfn-mgmt-backend-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ADMIN_USER_PASSWORD=${ADMIN_USER_PASSWORD}
      - POSTGRES_HOST=ioc-mgmt-relational-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ioc}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CFN_DEV_MODE=${CFN_DEV_MODE}
    restart: unless-stopped
    depends_on:
      ioc-mgmt-relational-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ioc-cfn-mgmt-backend-svc:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ioc-cfn-mgmt-ui-svc:
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-ui-svc:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CFN_UI_API_BASE_URL=http://ioc-cfn-mgmt-backend-svc:8000
      - NEXT_PUBLIC_CFN_UI_API_BASE_URL=http://localhost:8000
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    restart: unless-stopped
    depends_on:
      ioc-cfn-mgmt-backend-svc:
        condition: service_healthy
  ### End Application Services ###

volumes:
  postgres_data:
