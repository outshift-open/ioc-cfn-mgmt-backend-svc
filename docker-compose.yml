services:
  ### Database Services ###
  ioc-mgmt-relational-db:
    image: postgres:17-alpine
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - db-only
      - full-stack
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ioc}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-ioc} -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  ### End Database Services ###

  ### Application Services ###
  ioc-cfn-mgmt-backend-svc:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-backend-svc:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=ioc-cfn-mgmt-backend-svc
      - APPLICATION_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ADMIN_USER_PASSWORD=${ADMIN_USER_PASSWORD}
      - POSTGRES_HOST=ioc-mgmt-relational-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-ioc}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    depends_on:
      ioc-mgmt-relational-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://ioc-cfn-mgmt-backend-svc:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ioc-cfn-mgmt-ui-svc:
    image: ghcr.io/cisco-eti/ioc-cfn-mgmt-ui-svc:latest
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CFN_UI_API_BASE_URL=http://ioc-cfn-mgmt-backend-svc:8000
      - NEXT_PUBLIC_CFN_UI_API_BASE_URL=http://localhost:8000
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    restart: unless-stopped
    depends_on:
      ioc-cfn-mgmt-backend-svc:
        condition: service_healthy
  ioc-cfn-svc:
    image: ghcr.io/cisco-eti/ioc-cfn-svc:latest
    build:
      context: https://github.com/cisco-eti/ioc-cfn-svc.git
      dockerfile: build/Dockerfile
      args:
        GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
        GIT_COMMIT_TIME: ${GIT_COMMIT_TIME:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
    container_name: ioc-cfn-svc
    platform: ${DOCKER_DEFAULT_PLATFORM}
    profiles:
      - full-stack
    restart: unless-stopped
    ports:
      - "9010:9010"
    environment:
      PORT: "9010"
      APP_NAME: "ioc-cfn-svc"
      MGMT_URL: http://ioc-cfn-mgmt-backend-svc:8000
      CFN_NAME: ${CFN_NAME:-cfn-new}
      HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-10}
      MCP_ENABLED: ${MCP_ENABLED:-false}
      MCP_PORT: ${MCP_PORT:-9010}
      DB_HOST: ioc-mgmt-relational-db
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_NAME: ${DB_NAME:-cfn_cp}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
    depends_on:
      ioc-mgmt-relational-db:
        condition: service_healthy
      ioc-cfn-mgmt-backend-svc:
        condition: service_healthy
  ### End Application Services ###

volumes:
  postgres_data:
