# Alembic configuration for ioc-cfn-mgmt-plane-svc
#
# Usage:
#   task db-migrate-apply              Apply all pending migrations
#   task db-migrate-status             Show current revision & history
#   task db-migrate-revision -- "msg"  Autogenerate a new migration from model changes
#   task db-migrate-downgrade          Roll back one migration
#
# The actual database URL is built in alembic/env.py from POSTGRES_* env vars.
# The sqlalchemy.url below is only a fallback placeholder.

[alembic]
script_location = alembic
sqlalchemy.url = postgresql://localhost/cfn_mgmt
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S